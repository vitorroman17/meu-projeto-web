<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vitor</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
        
    <div class="container">
      <h1 class="text-center text-primary mt-5">Lançamento Oficial</h1>
    </div>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Meu Projeto</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Início</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="produtos.html">Produtos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="contato.html">Contato</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="row mt-5">
        <div class="col-md-4">
          <div class="card">
            <img src="https://picsum.photos/300/200?random=1" class="card-img-top" alt="Produto 1" />
            <div class="card-body">
              <h5 class="card-title">Produto 1</h5>
              <p class="card-text">Descrição do produto fictício.</p>
              <p>Preço: R$ 50,00</p>
              <input type="number" class="form-control mb-2" id="qtd-1" value="1" min="1" />
              <button class="btn btn-success w-100" onclick="adicionarAoCarrinho('Produto 1', 50.00, 'qtd-1')">Adicionar ao Carrinho</button>
            </div>
          </div>
        </div>

        <div class="col-md-4"> 
          <div class="card">
            <img src="https://picsum.photos/300/200?random=2" class="card-img-top" alt="Produto 2" />
            <div class="card-body">
              <h5 class="card-title">Produto 2</h5>
              <p class="card-text">Descrição do produto fictício.</p>
              <p>Preço: R$ 50,00</p>
              <input type="number" class="form-control mb-2" id="qtd-2" value="1" min="1" />
              <button class="btn btn-success w-100" onclick="adicionarAoCarrinho('Produto 2', 150.00, 'qtd-2')">Adicionar ao Carrinho</button>
            </div>
          </div>
        </div>

        <div class="col-md-4">
          <div class="card">  
            <img src="https://picsum.photos/300/200?random=3" class="card-img-top" alt="Produto 3" />  
            <div class="card-body">  
              <h5 class="card-title">Produto 3</h5>  
              <p class="card-text">Descrição do produto fictício.</p>
              <p>Preço: R$ 250,00</p>
              <input type="number" class="form-control mb-2" id="qtd-3" value="1" min="1" />
              <button class="btn btn-success w-100" onclick="adicionarAoCarrinho('Produto 3', 50.00, 'qtd-3')">Adicionar ao Carrinho</button>
            </div> 
          </div>
        </div>
      </div> 
    </div>
    
    <div class="container mt-5">
        <h3>Seu Carrinho</h3>
        <ul id="lista-carrinho" class="list-group mb-3">
            </ul>
        <div class="alert alert-info text-center">
            <h4>Valor Total: R$ <span id="valor-total">0,00</span></h4>
        </div>
        <button class="btn btn-primary w-100 mb-5" onclick="efetivarCompra()">Efetivar Compra</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
