<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vitor</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
        
    <div class="container">
      <h1 class="text-center text-primary mt-5">Lançamento Oficial</h1>
    </div>
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container-fluid">
        <a class="navbar-brand" href="#">Meu Projeto</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Início</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="produtos.html">Produtos</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="contato.html">Contato</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="container">
      <div class="row mt-5">
        
        <div class="col-md-4 mb-4">
          <div class="card">
            <img src="https://picsum.photos/300/200?random=1" class="card-img-top" alt="Produto 1" />
            <div class="card-body">
              <h5 class="card-title">Produto 1</h5>
              <h6 class="text-success mb-3">R$ 50,00</h6>
              <p class="card-text">Descrição do produto fictício.</p>
              <div class="form-check">
                <input class="form-check-input item-produto" type="checkbox" value="50.00" id="produto1Checkbox" />
                <label class="form-check-label" for="produto1Checkbox" >Selecionar Produto 1</label>
                <input type="number" class="form-control qtd-produto mt-2" placeholder="Quantidade" value="1" min="1" id="quantidadeProduto1" />
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-4 mb-4"> 
          <div class="card">
            <img src="https://picsum.photos/300/200?random=2" class="card-img-top" alt="Produto 2" />
            <div class="card-body">
              <h5 class="card-title">Produto 2</h5>
              <h6 class="text-success mb-3">R$ 50,00</h6>
              <p class="card-text">Descrição do produto fictício.</p>
              <div class="form-check">
                <input
                  class="form-check-input item-produto"
                  type="checkbox"
                  value="50.00"
                  id="produto2Checkbox"
                />
                <label class="form-check-label" for="produto2Checkbox"
                  >Selecionar Produto 2</label>
                <input
                  type="number"
                  class="form-control qtd-produto mt-2"
                  placeholder="Quantidade"
                  value="1"
                  min="1"
                  id="quantidadeProduto2"
                />
              </div>
            </div>
          </div>
        </div>

        <div class="col-md-4 mb-4">
          <div class="card">  
            <img
              src="https://picsum.photos/300/200?random=3"
              class="card-img-top"
              alt="Produto 3"
            />  
            <div class="card-body">  
              <h5 class="card-title">Produto 3</h5>
              <h6 class="text-success mb-3">R$ 50,00</h6>
              <p class="card-text">Descrição do produto fictício.</p>  
              <div class="form-check"> 
                <input
                  class="form-check-input item-produto"
                  type="checkbox"
                  value="50.00"
                  id="produto3Checkbox"
                /> 
                <label class="form-check-label" for="produto3Checkbox"
                  >Selecionar Produto 3</label> 
                <input
                  type="number"
                  class="form-control qtd-produto mt-2"
                  placeholder="Quantidade"
                  value="1"
                  min="1"
                  id="quantidadeProduto3"
                />
              </div> 
            </div> 
          </div>
        </div>
      </div> 
    </div>
    
    <div class="container mb-5">
      <div class="alert alert-info text-center mt-4">
          <h4>Valor Total: R$ <span id="valor-total">0,00</span></h4>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
   <script src="script.js"></script>
  </body>
</html>
