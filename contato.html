      <form id="form-contato">
        <div class="mb-3">
          <label for="nome" class="form-label">Nome</label>
          <input type="text" class="form-control" id="nome" placeholder="Digite seu nome" required
          />
        </div>
        <div class="mb-3">

          />
        </div>
        <div class="mb-3">

        <input type="text" class="form-control" id="cep" placeholder="Digite seu CEP" required />
        
        
          </div>

          <div class="mb-3">
        <label for="bairro" class="form-label">Bairro</label>
        <input type="text" class="form-control" id="bairro" placeholder="Digite seu bairro" required />
          </div>
          <div class="mb-3">

        <input type="text" class="form-control" id="cidade" placeholder="Digite sua cidade" required />
          </div>
          <div class="mb-3">
        <label for="estado" class="form-label">Estado</label>

          </div>
        <div class="mb-3">
          <label for="mensagem" class="form-label">Mensagem</label>
          <textarea class="form-control" id="mensagem" rows="4" placeholder="Digite sua mensagem" required
          ></textarea>

        </button>
