<!doctype html>
<html lang="pt-BR" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vitor</title>
    <script>
      (function () {
        var t = localStorage.getItem("tema") || "dark";
        document.documentElement.setAttribute("data-theme", t);
        document.documentElement.setAttribute(
          "data-bs-theme",
          t === "light" ? "light" : "dark",
        );
      })();
    </script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <div class="container">
      <h1 class="text-center text-primary mt-5">Lançamento Oficial</h1>
    </div>
    <div>
      <nav
        class="navbar navbar-expand-lg navbar-dark border-bottom border-secondary-subtle"
      >
        <div class="container-fluid">
          <a class="navbar-brand" href="#">Meu Projeto</a>
          <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navbarNav"
          >
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
              <li class="nav-item">
                <a class="nav-link" href="index.html">Início</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="produtos.html">Produtos</a>
              </li>
              <li class="nav-item">
                <a class="nav-link" href="contato.html">Contato</a>
              </li>
              <li class="nav-item ms-lg-3 mt-2 mt-lg-0">
                <button
                  id="btn-tema"
                  type="button"
                  class="btn btn-outline-light btn-sm"
                >
                  Tema: Dark
                </button>
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </div>

    <div class="container mt-5">
      <h2>O que nossos clientes dizem</h2>
      <div class="row" id="lista-depoimentos"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
